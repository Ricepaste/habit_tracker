<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>HabitFlow | 個人習慣追蹤</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>HabitFlow</h1>
            <p id="currentDate"></p>
        </header>

        <section class="card stats-grid">
            <div class="stat-item">
                <div id="statCompletion" class="stat-value">0%</div>
                <div class="stat-label">今日完成度</div>
            </div>
            <div class="stat-item">
                <div id="statTotalHabits" class="stat-value">0</div>
                <div class="stat-label">追蹤項目</div>
            </div>
        </section>

        <section class="card">
            <div class="add-habit-container">
                <input type="text" id="habitInput" placeholder="新的好習慣..." autocomplete="off">
                <button class="add-btn" onclick="addHabit()">新增</button>
            </div>
        </section>

        <div id="habitList" class="habit-list">
            <!-- Habits will be rendered here -->
        </div>
    </div>

    <!-- Navigation/Status indicators could go here -->
    
    <script src="app.js"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Registration Failed', err));
            });
        }
    </script>
</body>
</html>
